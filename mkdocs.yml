site_name: Слёт «Христианин последнего времени» 2026
site_description: Материалы недельного христианского слёта — бодрствование, различение, верность
site_url: https://danielfilinski.github.io/giveWING-scheme/
site_author: GiveWing

docs_dir: "2026"

theme:
  name: material
  language: ru
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Тёмная тема
    - scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Светлая тема
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Ссылка на раздел
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true

hooks:
  - hooks/generate_nav.py

plugins:
  - search:
      lang:
        - ru
        - en
  - awesome-pages

extra_javascript:
  - javascripts/print.js

extra_css:
  - stylesheets/print-selector.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DanielFilinski/giveWING-scheme

repo_url: https://github.com/DanielFilinski/giveWING-scheme
repo_name: giveWING-scheme
edit_uri: ""
